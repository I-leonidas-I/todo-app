name: Testes do Frontend

on:
  push:
    branches: [ main ]

jobs:
  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar http-server globalmente
        run: npm install -g http-server

      - name: Iniciar serviços e rodar testes
        uses: cypress-io/github-action@v6
        with:
          spec: cypress/e2e/frontend.cy.js
          start: |
            node backend/server.js
            http-server frontend -p 5500
          wait-on: 'http://localhost:5500, http://localhost:3001/tasks'