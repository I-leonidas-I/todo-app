name: Testes do Frontend

on:
  push:
    branches: [ main ]

jobs:
  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar dependências
        run: npm install

      - name: Instalar http-server localmente
        run: npm install http-server

      - name: Iniciar backend em segundo plano
        run: node backend/server.js &

      - name: Iniciar frontend em segundo plano
        run: ./node_modules/.bin/http-server frontend -p 5500 &

      - name: Aguardar serviços iniciarem
        run: sleep 8

      - name: Rodar testes do frontend
        run: ./node_modules/.bin/cypress run --spec cypress/e2e/frontend.cy.js