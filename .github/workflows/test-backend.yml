name: Testes do Backend

on:
  push:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar dependências
        run: npm install

      - name: Iniciar backend em segundo plano
        run: node backend/server.js &

      - name: Aguardar backend iniciar
        run: sleep 5

      - name: Rodar testes do backend
        run: npx cypress run --spec cypress/e2e/backend.cy.js